<script data-purpose="form-logic">
    // Auth guard
    (function () {
        const session = localStorage.getItem('session');
        if (!session) {
            window.location.href = 'login.html';
        }
    })();

    // Cambiar capturista
    document.getElementById('btn-cambiar-capturista').addEventListener('click', function () {
        if (confirm('¿Cerrar sesión y cambiar de capturista?')) {
            localStorage.removeItem('session');
            localStorage.removeItem('beneficiario_id');
            window.location.href = 'login.html';
        }
    });

    function getFormData(status) {
        const f = document.querySelector('form');
        const fd = new FormData(f);
        const get = (name) => fd.get(name) || '';

        const session = JSON.parse(localStorage.getItem('session'));

        const toIntOrNull = (v) => { const n = parseInt(v, 10); return isNaN(n) ? null : n; };
        const toFloatOrNull = (v) => { const n = parseFloat(v); return isNaN(n) ? null : n; };

        const tutores = [];
        tutores.push({
            numero_tutor: 1,
            nombre: get('tutor1_nombre'),
            edad: toIntOrNull(get('tutor1_edad')),
            nivel_estudios: get('tutor1_nivel_estudios'),
            estado_civil: get('tutor1_estado_civil'),
            num_hijos: toIntOrNull(get('tutor1_num_hijos')) || 0,
            vivienda: get('tutor1_vivienda'),
            fuente_empleo: get('tutor1_fuente_empleo'),
            antiguedad: get('tutor1_antiguedad'),
            ingreso_mensual: toFloatOrNull(get('tutor1_ingreso_mensual')),
            tiene_imss: f.querySelector('[name="tutor1_imss"]').checked,
            tiene_infonavit: f.querySelector('[name="tutor1_infonavit"]').checked,
        });

        const tutor2Nombre = get('tutor2_nombre').trim();
        if (tutor2Nombre) {
            tutores.push({
                numero_tutor: 2,
                nombre: tutor2Nombre,
                edad: toIntOrNull(get('tutor2_edad')),
                nivel_estudios: get('tutor2_nivel_estudios'),
                estado_civil: get('tutor2_estado_civil'),
                num_hijos: toIntOrNull(get('tutor2_num_hijos')) || 0,
                vivienda: get('tutor2_vivienda'),
                fuente_empleo: get('tutor2_fuente_empleo'),
                antiguedad: get('tutor2_antiguedad'),
                ingreso_mensual: toFloatOrNull(get('tutor2_ingreso_mensual')),
                tiene_imss: f.querySelector('[name="tutor2_imss"]').checked,
                tiene_infonavit: f.querySelector('[name="tutor2_infonavit"]').checked,
            });
        }

        return {
            capturista_id: session.capturista_id,
            beneficiario: {
                nombre: get('nombre'),
                fecha_nacimiento: get('fecha_nacimiento'),
                diagnostico: get('diagnostico'),
                calle: get('calle'),
                colonia: get('colonia'),
                ciudad: get('ciudad'),
                telefonos: get('telefonos'),
            },
            tutores,
            estudio: {
                otras_fuentes_ingreso: get('otras_fuentes_ingreso'),
                monto_otras_fuentes: toFloatOrNull(get('monto_otras_fuentes')),
                tuvo_silla_previa: get('silla_previa') === 'Sí',
                como_obtuvo_silla: get('como_obtuvo_silla'),
                elaboro_estudio: get('elaboro_estudio'),
                fecha_estudio: get('fecha_estudio'),
                sede: get('sede'),
                status,
            }
        };
    }

    async function submitEstudio(status) {
        const errorEl = document.getElementById('error-msg');
        errorEl.classList.add('hidden');
        errorEl.textContent = '';

        const payload = getFormData(status);

        try {
            const res = await fetch('http://localhost:8001/api/estudios', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });

            if (!res.ok) {
                const data = await res.json().catch(() => ({}));
                errorEl.textContent = data.detail || 'Error al guardar el estudio. Intente de nuevo.';
                errorEl.classList.remove('hidden');
                return;
            }

            const data = await res.json();
            localStorage.setItem('beneficiario_id', data.beneficiario_id);
            window.location.href = 'tecnica.html';
        } catch (err) {
            errorEl.textContent = 'No se pudo conectar con el servidor.';
            errorEl.classList.remove('hidden');
        }
    }

    // Guardar Borrador button
    document.querySelector('button[type="button"]').addEventListener('click', () => {
        submitEstudio('borrador');
    });

    // Guardar Estudio (submit)
    document.querySelector('form').addEventListener('submit', (e) => {
        e.preventDefault();
        submitEstudio('completo');
    });
</script>
